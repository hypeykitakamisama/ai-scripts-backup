<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声验证 · Whisper Verifier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e11;
    --surface: #16161c;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c6af7;
    --accent2: #e06c75;
    --accent3: #61d4b3;
    --text: #e8e8f0;
    --muted: #6e6e88;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 32px 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header span {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 340px 12px 1fr;
    gap: 20px;
    /* 宽屏时居中并随窗口扩展 */
    max-width: 1600px;
    width: calc(100% - 48px);
    margin: 0 auto;
  }

  /* draggable gutter between panes */
  .gutter {
    width: 12px;
    cursor: col-resize;
    background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.03));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .gutter:hover { background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.05)); }
  .gutter-handle {
    width: 2px;
    height: 36px;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border-radius: 2px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  /* Collapsible body animation */
  .collapsible-body {
    overflow: hidden;
    transition: max-height 300ms ease, opacity 250ms ease, padding 250ms ease;
    max-height: 2000px; /* large enough for expanded content */
    opacity: 1;
  }
  .collapsible-body.collapsed {
    max-height: 0;
    opacity: 0;
    padding-top: 0 !important;
    padding-bottom: 0 !important;
  }

  .collapse-icon {
    display: inline-block;
    width: 18px;
    height: 18px;
    transition: transform 250ms ease;
    vertical-align: middle;
  }
  .collapse-icon.rotate { transform: rotate(-180deg); }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }

  input[type="text"]:focus, input[type="password"]:focus,
  textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  select option { background: var(--surface2); }

  .tag-input-wrapper {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
    min-height: 44px;
    cursor: text;
    transition: border-color 0.2s;
  }

  .tag-input-wrapper:focus-within { border-color: var(--accent); }

  .tag {
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.3);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .tag-remove {
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
  }
  .tag-remove:hover { color: var(--accent2); }

  .tag-input {
    border: none;
    background: transparent;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    flex: 1;
    min-width: 80px;
    padding: 2px 4px;
  }

  .audio-drop {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 14px;
    position: relative;
  }

  .audio-drop:hover, .audio-drop.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,247,0.05);
  }

  .audio-drop input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  .audio-drop-icon { font-size: 24px; margin-bottom: 6px; }
  .audio-drop-text { font-size: 12px; color: var(--muted); }
  .audio-drop-name { font-size: 13px; color: var(--accent3); margin-top: 6px; }

  audio {
    width: 100%;
    margin-bottom: 14px;
    border-radius: 6px;
  }

  button.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  /* compact inline button for toolbar use */
  .btn-inline { width: auto; padding: 6px 10px; font-size: 12px; }

  /* translate history select styling */
  .history-select { min-width: 220px; max-width: 360px; height: 32px; padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); }

  button.btn-primary {
    background: var(--accent);
    color: #fff;
  }
  button.btn-primary:hover:not(:disabled) {
    background: #9585ff;
    transform: translateY(-1px);
  }
  button.btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Right panel */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .result-area {
    flex: 1;
    min-height: 400px;
    display: flex;
    flex-direction: column;
  }

  .result-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
    gap: 10px;
  }

  .result-placeholder .icon { font-size: 36px; opacity: 0.3; }

  /* Result cards */
  .result-word-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 12px;
    border-left: 3px solid var(--accent);
  }

  .word-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .word-original {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--accent);
  }

  .word-arrow { color: var(--muted); font-size: 14px; }

  .candidates {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .candidate {
    background: rgba(97,212,179,0.1);
    border: 1px solid rgba(97,212,179,0.25);
    color: var(--accent3);
    border-radius: 5px;
    padding: 3px 10px;
    font-size: 13px;
  }

  .candidate.best {
    background: rgba(97,212,179,0.2);
    border-color: var(--accent3);
    font-weight: 500;
  }

  .reasoning {
    font-size: 13px;
    color: #aaa;
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 4px;
  }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 60px 0;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Summary box */
  .summary-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .error-box {
    background: rgba(224,108,117,0.08);
    border: 1px solid rgba(224,108,117,0.25);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--accent2);
    line-height: 1.7;
  }

  .config-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    margin-bottom: 14px;
  }
  .config-toggle:hover { color: var(--text); }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(124,106,247,0.15);
    color: var(--accent);
    letter-spacing: 0.5px;
    margin-left: 4px;
    vertical-align: middle;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>音声验证</h1>
  <span>Whisper Verifier</span>
</header>

<div class="layout">

  <!-- LEFT: Config + Input -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <!-- API Config (collapsible) -->
    <div class="panel">
      <div class="panel-title" style="cursor:pointer;" id="apiPanelTitle">
        <span>API 配置</span>
        <button id="apiToggleBtn" class="btn btn-primary" style="width:auto;padding:6px 8px;margin-left:8px;display:inline-flex;align-items:center;gap:6px;" onclick="toggleApiConfig()" aria-expanded="true" title="折叠 / 展开 API 配置">
          <span class="collapse-icon" id="apiCollapseIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </span>
        </button>
      </div>

      <div id="apiConfigBody" class="collapsible-body">
        <label>API Key（仅本地存储）——</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." />

        <label>API 提供商</label>
        <select id="providerSelect" onchange="onProviderChange()">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI (GPT-4o 等)</option>
          <option value="google">Google (Gemini)</option>
          <option value="custom">自定义 Endpoint</option>
        </select>

        <div id="customEndpointWrap" style="display:none;">
          <label>自定义 API Endpoint</label>
          <input type="text" id="customEndpoint" placeholder="https://your-api.com/v1/messages" />
        </div>

        <label>模型名称 <span class="badge" style="margin-top:-6px;">自动获取 / 手动</span></label>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <input id="modelFilter" placeholder="搜索模型或输入关键字…" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);" />
            <select id="modelSelect" style="width:100%;height:40px;"></select>
          </div>
          <div id="modelButtonsWrap" style="display:flex;flex-direction:column;gap:6px;align-items:center;width:96px;">
            <button id="modelRefreshBtn" class="btn btn-primary" style="width:96px;padding:8px;margin-top:-20px;font-size:12px" onclick="fetchModels()">刷新</button>
            <button id="addFavBtn" class="btn btn-primary" style="width:96px;padding:6px;margin-top:4px;font-size:12px" onclick="toggleFavorite()">收藏</button>
          </div>
        </div>

        <div id="modelExtras" style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
          <div id="modelLoading" style="display:none;color:var(--muted);font-size:12px;">加载模型中… <span id="modelSpinner">⏳</span></div>
          <div id="modelError" style="display:none;color:var(--accent2);font-size:12px;"></div>
          <button id="clearKeyBtn" class="btn btn-primary" style="padding:6px;font-size:12px;width:120px;" onclick="clearApiKey()">清除 API Key</button>
        </div>

        <div id="customModelWrap" style="display:none;">
          <label>自定义模型名称</label>
          <input type="text" id="modelInput" placeholder="例：gemini-2.0-flash, gpt-4o, claude-sonnet-4-5…" />
        </div>

        <div id="modelHints" style="font-size:11px;color:var(--muted);margin-top:-10px;margin-bottom:14px;line-height:1.8;"></div>
      </div>
    </div>

    <!-- Input -->
    <div class="panel">
      <div class="panel-title">输入信息</div>

      <label>音频片段</label>
      <div class="audio-drop" id="audioDrop">
        <input type="file" id="audioFile" accept="audio/*" />
        <div class="audio-drop-icon">🎵</div>
        <div class="audio-drop-text">点击或拖入音频文件</div>
        <div class="audio-drop-name" id="audioFileName"></div>
      </div>
      <audio id="audioPreview" controls style="display:none;"></audio>
      <div style="margin-top:8px;">
        <button id="clearAudioBtn" class="btn btn-primary" style="width:100%;padding:8px;font-size:13px;" onclick="clearAudio()">删除音频</button>
      </div>

      <label>Whisper 转录结果</label>
      <textarea id="whisperResult" placeholder="粘贴 Whisper 输出的日语文本…" style="min-height:70px;"></textarea>

      <label>疑难词汇 <span class="badge" style="margin-top:-4px;">回车添加</span></label>
      <div class="tag-input-wrapper" id="tagWrapper">
        <input class="tag-input" id="tagInput" placeholder="输入词汇后按回车…" />
      </div>

      <label>台词背景说明（可选）</label>
      <textarea id="context" placeholder="例：这是一段动漫对话，说话者是关西腔的中年男性，场景在餐厅…" style="min-height:60px;"></textarea>

      <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">开始分析</button>
    </div>
  </div>

  <!-- GUTTER: draggable splitter -->
  <div id="dragGutter" class="gutter" role="separator" aria-orientation="vertical" aria-label="调整面板宽度">
    <div class="gutter-handle" aria-hidden="true"></div>
  </div>

  <!-- RIGHT: Result -->
  <div class="right-panel">
    <div class="panel result-area">
      <div class="panel-title" style="display:flex;align-items:center;gap:8px;">
        <span>分析结果</span>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
          <select id="translateLang" class="history-select" style="margin-top:10px" title="目标语言">
            <option value="zh">中文（简体）</option>
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
          <button id="translateBtn" class="btn btn-primary btn-inline" onclick="translateResults()">翻译</button>
          <button id="resetLangBtn" class="btn btn-primary btn-inline" style="display:none;" onclick="renderResult(lastData)">重置</button>
          <select id="translateHistory" class="history-select" style="display:none;padding:6px;margin-top:12px" title="翻译历史（最近 10 条）"></select>
          <button id="viewHistoryBtn" class="btn btn-primary btn-inline" style="display:none;" onclick="viewHistory()">查看</button>
          <button id="clearHistoryBtn" class="btn btn-primary btn-inline" style="display:none;" onclick="clearHistory()">清除</button>
        </div>
      </div>
        <div id="resultContent">
        <div class="result-placeholder">
          <div class="icon">🎧</div>
          <div>填写左侧信息后点击「开始分析」</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// --- Tag input ---
const tags = [];
const tagInput = document.getElementById('tagInput');
const tagWrapper = document.getElementById('tagWrapper');

tagWrapper.addEventListener('click', () => tagInput.focus());

tagInput.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === '，' || e.key === ',') && tagInput.value.trim()) {
    e.preventDefault();
    addTag(tagInput.value.trim());
    tagInput.value = '';
  }
  if (e.key === 'Backspace' && !tagInput.value && tags.length) {
    removeTag(tags.length - 1);
  }
});

function addTag(val) {
  if (tags.includes(val)) return;
  tags.push(val);
  renderTags();
}

function removeTag(i) {
  tags.splice(i, 1);
  renderTags();
}

function renderTags() {
  const existing = tagWrapper.querySelectorAll('.tag');
  existing.forEach(el => el.remove());
  tags.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tag';
    el.innerHTML = `${t}<span class="tag-remove" onclick="removeTag(${i})">×</span>`;
    tagWrapper.insertBefore(el, tagInput);
  });
}

// --- Audio ---
const audioFile = document.getElementById('audioFile');
const audioPreview = document.getElementById('audioPreview');
const audioFileName = document.getElementById('audioFileName');
let audioBase64 = null;
let audioMime = null;
let lastData = null;

audioFile.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  audioFileName.textContent = file.name;
  audioMime = file.type || 'audio/mpeg';
  const url = URL.createObjectURL(file);
  audioPreview.src = url;
  audioPreview.style.display = 'block';

  const reader = new FileReader();
  reader.onload = ev => {
    audioBase64 = ev.target.result.split(',')[1];
  };
  reader.readAsDataURL(file);
});

function clearAudio() {
  // clear file input
  try { audioFile.value = ''; } catch(e) {}
  // clear preview
  audioPreview.pause();
  audioPreview.src = '';
  audioPreview.style.display = 'none';
  // clear meta
  audioFileName.textContent = '';
  audioBase64 = null;
  audioMime = null;
  showSaveIndicator('音频已移除');
}

// Drag
const audioDrop = document.getElementById('audioDrop');
audioDrop.addEventListener('dragover', e => { e.preventDefault(); audioDrop.classList.add('drag-over'); });
audioDrop.addEventListener('dragleave', () => audioDrop.classList.remove('drag-over'));
audioDrop.addEventListener('drop', e => {
  e.preventDefault();
  audioDrop.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    audioFile.files = e.dataTransfer.files;
    audioFile.dispatchEvent(new Event('change'));
  }
});

// --- Provider hints ---
const PROVIDER_HINTS = {
  anthropic: '推荐模型：claude-opus-4-5 / claude-sonnet-4-5',
  openai: '推荐模型：gpt-4o / gpt-4o-mini（支持音频输入）',
  google: '推荐模型：gemini-3.0-flash / gemini-3.1-pro（支持音频输入）',
  custom: '请填写自定义 Endpoint 地址，消息格式需兼容 OpenAI 规范'
};

const PROVIDER_ENDPOINTS = {
  anthropic: 'https://api.anthropic.com/v1/messages',
  openai: 'https://api.openai.com/v1/chat/completions',
  google: '', // dynamically set with model name
};

function onProviderChange() {
  const provider = document.getElementById('providerSelect').value;
  document.getElementById('modelHints').textContent = PROVIDER_HINTS[provider] || '';
  document.getElementById('customEndpointWrap').style.display = provider === 'custom' ? 'block' : 'none';
  // Suggest a default model name
  const defaults = { anthropic: 'claude-sonnet-4-5', openai: 'gpt-4o', google: 'gemini-2.0-flash', custom: '' };
  document.getElementById('modelInput').placeholder = defaults[provider] || '';
  // Try to fetch available models for the provider
  populateModelSelect([]); // reset while loading
  setTimeout(() => { // slight delay to allow apiKey entry reaction
    fetchModels();
  }, 120);
}

// --- Model fetching & UI helpers ---
async function fetchModels() {
  const provider = document.getElementById('providerSelect').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  const select = document.getElementById('modelSelect');
  // UI: show loading
  const loadingEl = document.getElementById('modelLoading');
  const errorEl = document.getElementById('modelError');
  loadingEl && (loadingEl.style.display = 'block');
  errorEl && (errorEl.style.display = 'none');
  document.getElementById('modelRefreshBtn').disabled = true;
  select.innerHTML = '<option value="">加载中…</option>';

  try {
    let models = [];
    // try cache first (1 hour)
    const cacheKey = `whisper_models_${provider}`;
    try {
      const raw = localStorage.getItem(cacheKey);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.ts && Date.now() - parsed.ts < 1000 * 60 * 60 && Array.isArray(parsed.models) && parsed.models.length) {
          models = parsed.models;
        }
      }
    } catch(e) {}

    if (!models.length) {
      if (provider === 'openai') {
        if (!apiKey) throw new Error('需要 OpenAI Key 才能列出模型');
        const resp = await fetch('https://api.openai.com/v1/models', { headers: { 'Authorization': `Bearer ${apiKey}` } });
        if (!resp.ok) throw new Error('无法从 OpenAI 获取模型列表');
        const data = await resp.json();
        models = (data.data || []).map(m => m.id).filter(Boolean);
      } else if (provider === 'anthropic') {
        if (!apiKey) throw new Error('需要 Anthropic Key 才能列出模型');
        const resp = await fetch('https://api.anthropic.com/v1/models', { headers: { 'x-api-key': apiKey } });
        if (!resp.ok) throw new Error('无法从 Anthropic 获取模型列表');
        const data = await resp.json();
        models = (data.models || []).map(m => m.name || m.id).filter(Boolean);
      } else if (provider === 'google') {
        // Google 没有简单的公开列表，使用推荐默认值
        models = ['gemini-3.1-flash-lite-preview','gemini-2.5-flash', 'gemini-3.1-pro'];
      } else {
        models = [];
      }
      // cache results
      try { localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), models })); } catch(e){}
    }

    populateModelSelect(models);
  } catch (e) {
    populateModelSelect([]);
    if (errorEl) {
      errorEl.style.display = 'block';
      errorEl.innerHTML = (e.message || '模型列表加载失败') + ' <a href="#" onclick="fetchModels();return false;" style="color:var(--accent);">重试</a>';
    } else {
      document.getElementById('modelHints').textContent = e.message || '模型列表加载失败';
    }
  } finally {
    loadingEl && (loadingEl.style.display = 'none');
    document.getElementById('modelRefreshBtn').disabled = false;
    applyModelFilter();
    renderFavorites();
  }
}

function populateModelSelect(models) {
  const select = document.getElementById('modelSelect');
  const prev = select.value || '';
  select.innerHTML = '';
  // prefer a blank placeholder
  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '（选择模型）';
  select.appendChild(placeholder);
  models.forEach(m => {
    const op = document.createElement('option');
    op.value = m;
    op.textContent = m;
    select.appendChild(op);
  });
  const customOp = document.createElement('option');
  customOp.value = 'custom';
  customOp.textContent = '自定义';
  select.appendChild(customOp);

  // restore previous selection if present
  if (prev) {
    const found = Array.from(select.options).some(o => o.value === prev);
    select.value = found ? prev : 'custom';
  }
  // toggle custom input visibility
  document.getElementById('customModelWrap').style.display = select.value === 'custom' ? 'block' : 'none';
}

// --- Splitter: drag to resize left/right panes ---
function initSplitter() {
  const gutter = document.getElementById('dragGutter');
  const layout = document.querySelector('.layout');
  if (!gutter || !layout) return;

  let dragging = false;

  function onPointerMove(e) {
    if (!dragging) return;
    const rect = layout.getBoundingClientRect();
    let x = e.clientX - rect.left; // new left width in px
    const minLeft = 160; // min left column
    const minRight = 300; // min right column
    x = Math.max(minLeft, Math.min(rect.width - minRight, x));
    layout.style.gridTemplateColumns = `${Math.round(x)}px 12px 1fr`;
    try { localStorage.setItem('whisper_split_px', Math.round(x)); } catch (err) {}
  }

  function onPointerUp(e) {
    if (!dragging) return;
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);
  }

  gutter.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    dragging = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
  });

  // restore saved split
  try {
    const saved = parseInt(localStorage.getItem('whisper_split_px'), 10);
    const rect = layout.getBoundingClientRect();
    if (!isNaN(saved) && saved > 0 && rect.width > 0) {
      const minLeft = 120; const minRight = 240;
      const x = Math.max(minLeft, Math.min(rect.width - minRight, saved));
      layout.style.gridTemplateColumns = `${Math.round(x)}px 12px 1fr`;
    }
  } catch(e) {}
}

// --- Anthropic ---
async function callAnthropic(apiKey, model, prompt) {
  const content = [];
  if (audioBase64) {
    content.push({ type: 'text', text: '以下是需要验证的日语音频片段，请仔细聆听：' });
    content.push({ type: 'document', source: { type: 'base64', media_type: audioMime, data: audioBase64 } });
  }
  content.push({ type: 'text', text: prompt });

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model, max_tokens: 2000, messages: [{ role: 'user', content }] })
  });
  if (!resp.ok) { const e = await resp.json().catch(()=>{}); throw new Error(e?.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  const raw = data.content.map(b => b.text || '').join('');
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

// --- OpenAI compatible ---
async function callOpenAICompat(apiKey, model, prompt, endpoint) {
  const messages = [];
  const userContent = [];

  if (audioBase64) {
    // OpenAI audio input format
    userContent.push({
      type: 'input_audio',
      input_audio: { data: audioBase64, format: audioMime.split('/')[1] || 'mp3' }
    });
  }
  userContent.push({ type: 'text', text: prompt });
  messages.push({ role: 'user', content: userContent });

  const resp = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({ model, max_tokens: 2000, messages })
  });
  if (!resp.ok) { const e = await resp.json().catch(()=>{}); throw new Error(e?.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  const raw = data.choices?.[0]?.message?.content || '';
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

// --- Google Gemini ---
async function callGemini(apiKey, model, prompt) {
  const parts = [];
  if (audioBase64) {
    parts.push({ inlineData: { mimeType: audioMime, data: audioBase64 } });
  }
  parts.push({ text: prompt });

  const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const resp = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: { maxOutputTokens: 2000 }
    })
  });
  if (!resp.ok) { const e = await resp.json().catch(()=>{}); throw new Error(e?.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return JSON.parse(raw.replace(/```json|```/g, '').trim());
}

// --- 翻译支持 ---
async function callTranslate(provider, apiKey, model, dataObj, targetLangLabel) {
  const bodyText = JSON.stringify(dataObj, null, 2);
  const prompt = `请将下面 JSON 中所有用户可读的文本字段（例如: original, candidates, best, reasoning, overall_suggestion）翻译为：${targetLangLabel}。请保持原有 JSON 结构不变，仅返回翻译后的 JSON，不要添加解释或多余内容。\n\n${bodyText}`;

  if (provider === 'anthropic') {
    return await callAnthropic(apiKey, model, prompt);
  } else if (provider === 'openai' || provider === 'custom') {
    const endpoint = provider === 'custom' ? document.getElementById('customEndpoint').value.trim() : PROVIDER_ENDPOINTS.openai;
    return await callOpenAICompat(apiKey, model, prompt, endpoint);
  } else if (provider === 'google') {
    return await callGemini(apiKey, model, prompt);
  }
  throw new Error('未知的提供商');
}

async function translateResults() {
  if (!lastData) { alert('请先生成分析结果后再点击翻译。'); return; }
  const provider = document.getElementById('providerSelect').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = getSelectedModelValue();
  const lang = document.getElementById('translateLang').value;
  const labels = { zh: '中文（简体）', ja: '日本語', en: 'English' };
  const target = labels[lang] || lang;
  if (!apiKey) { alert('请先填写 API Key'); return; }
  if (!model) { alert('请先选择或填写模型名称'); return; }

  const btn = document.getElementById('translateBtn');
  btn.disabled = true;
  const resultDiv = document.getElementById('resultContent');
  resultDiv.innerHTML = `<div class="loading-state"><div class="spinner"></div><div>正在将结果翻译为 ${target}…</div></div>`;
  try {
    let translated = await callTranslate(provider, apiKey, model, lastData, target);
    // 若返回为字符串，尝试解析为 JSON（容忍代码块标记）
    if (typeof translated === 'string') {
      try {
        translated = JSON.parse(translated.replace(/```json|```/g, '').trim());
      } catch (e) {
        // 无法解析为 JSON，则在界面显示原始文本作为回退
        resultDiv.innerHTML = `<div class="panel-title" style="margin-bottom:10px;">翻译结果（原文）</div><div class="summary-box" style="white-space:pre-wrap;">${escapeHtml(translated)}</div>`;
        const resetBtn = document.getElementById('resetLangBtn'); if (resetBtn) resetBtn.style.display = 'inline-flex';
        return;
      }
    }

    // 如果解析后仍然不是期望的结构，则显示原始 JSON
    if (!translated || !translated.words) {
      resultDiv.innerHTML = `<div class="panel-title" style="margin-bottom:10px;">翻译结果（JSON）</div><div class="summary-box" style="white-space:pre-wrap;">${escapeHtml(JSON.stringify(translated, null, 2))}</div>`;
      const resetBtn = document.getElementById('resetLangBtn'); if (resetBtn) resetBtn.style.display = 'inline-flex';
      return;
    }

    renderResult(translated);
    const resetBtn = document.getElementById('resetLangBtn'); if (resetBtn) resetBtn.style.display = 'inline-flex';
    // 保存历史（最多 10 条）
    try {
      const histEntry = { ts: Date.now(), lang, label: target, data: typeof translated === 'string' ? translated : JSON.stringify(translated) };
      saveTranslateHistoryEntry(histEntry);
    } catch (e) {}
  } catch (e) {
    resultDiv.innerHTML = `<div class="error-box">翻译失败：${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// --- 翻译历史（localStorage） ---
const HISTORY_KEY = 'whisper_translate_history';
function loadTranslateHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e){ return []; } }
function saveTranslateHistory(list) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); } catch(e){} }
function saveTranslateHistoryEntry(entry) {
  const list = loadTranslateHistory();
  list.unshift(entry);

function renderTranslateHistory() {
  const sel = document.getElementById('translateHistory');
  const viewBtn = document.getElementById('viewHistoryBtn');
  const clearBtn = document.getElementById('clearHistoryBtn');
  if (!sel) return;
  const list = loadTranslateHistory();
  if (!list.length) {
    sel.style.display = 'none'; if (viewBtn) viewBtn.style.display = 'none'; if (clearBtn) clearBtn.style.display = 'none';
    return;
  }
  sel.style.display = 'inline-block';
  sel.innerHTML = '';
  list.forEach((h, i) => {
    const d = new Date(h.ts);
    const op = document.createElement('option');
    op.value = i;
    op.textContent = `${d.toLocaleString()} — ${h.label}`;
    sel.appendChild(op);
  });
  if (viewBtn) viewBtn.style.display = 'inline-flex';
  if (clearBtn) clearBtn.style.display = 'inline-flex';
}

function viewHistory() {
  const sel = document.getElementById('translateHistory');
  if (!sel || sel.value === '') return;
  const idx = parseInt(sel.value, 10);
  const list = loadTranslateHistory();
  const entry = list[idx];
  if (!entry) return;
  try {
    const parsed = JSON.parse(entry.data);
    renderResult(parsed);
  } catch (e) {
    document.getElementById('resultContent').innerHTML = `<div class="panel-title" style="margin-bottom:10px;">翻译结果（原文）</div><div class="summary-box" style="white-space:pre-wrap;">${escapeHtml(entry.data)}</div>`;
  }
}

function clearHistory() {
  if (!confirm('确定清除翻译历史（最近 10 条）吗？')) return;
  localStorage.removeItem(HISTORY_KEY);
  renderTranslateHistory();
}

// 初始化渲染历史
document.addEventListener('DOMContentLoaded', () => { renderTranslateHistory(); });

function renderResult(data) {
  const resultDiv = document.getElementById('resultContent');
  let html = '';
  // store last raw data for translation / reset
  try { lastData = data; } catch (e) {}

  if (data.words && data.words.length) {
    data.words.forEach(w => {
      const candidatesHtml = w.candidates.map(c =>
        `<span class="candidate ${c === w.best ? 'best' : ''}">${c === w.best ? '★ ' : ''}${c}</span>`
      ).join('');
      html += `
        <div class="result-word-card">
          <div class="word-header">
            <span class="word-original">${w.original}</span>
            <span class="word-arrow">→</span>
            <span style="color:var(--accent3);font-weight:500;">${w.best}</span>
          </div>
          <div class="candidates">${candidatesHtml}</div>
          <div class="reasoning">${w.reasoning}</div>
        </div>`;
    });
  }

  if (data.overall_suggestion) {
    html += `
      <div style="margin-top:8px;">
        <div class="panel-title" style="margin-bottom:10px;">整体建议</div>
        <div class="summary-box">${data.overall_suggestion}</div>
      </div>`;
  }

  resultDiv.innerHTML = html || '<div class="result-placeholder"><div>未返回有效结果</div></div>';
}
</script>
</body>
</html>
